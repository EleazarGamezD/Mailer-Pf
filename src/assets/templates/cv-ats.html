<!doctype html>
<html lang="{{lang}}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{documentTitle}}</title>
    <style>
      @page {
        size: A4;
        margin: 14mm 15mm;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: #1d2939;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 10.2pt;
        line-height: 1.38;
        background: #ffffff;
      }

      h1,
      h2,
      h3,
      p,
      ul {
        margin-top: 0;
      }

      header {
        padding-bottom: 10px;
        border-bottom: 1px solid #d0d5dd;
      }

      h1 {
        margin-bottom: 4px;
        color: #101828;
        font-size: 24pt;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .headline {
        margin-bottom: 8px;
        color: #344054;
        font-size: 11pt;
        font-weight: 700;
      }

      .contact {
        display: flex;
        flex-wrap: wrap;
        gap: 4px 11px;
        margin: 0;
        padding: 0;
        color: #344054;
        list-style: none;
      }

      .contact a {
        color: #344054;
        text-decoration: none;
      }

      main {
        padding-top: 10px;
      }

      section {
        break-inside: avoid;
        margin-bottom: 12px;
      }

      h2 {
        margin-bottom: 6px;
        padding-bottom: 2px;
        color: #175cd3;
        border-bottom: 1px solid #d0d5dd;
        font-size: 11pt;
        line-height: 1.2;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h3 {
        margin-bottom: 1px;
        color: #101828;
        font-size: 10.6pt;
        line-height: 1.25;
      }

      p {
        margin-bottom: 6px;
      }

      ul {
        margin-bottom: 0;
        padding-left: 16px;
      }

      li {
        margin-bottom: 2px;
      }

      .summary {
        text-align: left;
      }

      .skill-group {
        margin-bottom: 4px;
      }

      .skill-group strong {
        color: #101828;
      }

      .role {
        break-inside: avoid;
        margin-bottom: 10px;
      }

      .role-meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: #475467;
        font-size: 9.6pt;
      }

      .position {
        font-weight: 700;
      }

      .period {
        white-space: nowrap;
      }

      .tech-stack,
      .keywords {
        color: #344054;
        font-size: 9.7pt;
      }

      .keywords {
        margin-bottom: 0;
      }

      .muted {
        color: #667085;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>{{fullName}}</h1>
      <p class="headline">{{headline}}</p>
      <ul class="contact">{{contactItems}}</ul>
    </header>

    <main>
      {{summarySection}}
      {{skillsSection}}
      {{experienceSection}}
      {{educationSection}}
      {{certificationsSection}}
    </main>
  </body>
</html>
